<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="title">Basic Calculator</div>
    <div class="calculator">
        <h1 class="display" style="text-align: center;" id="display">0</h1>
        <div class="buttons">
            <button class="clear" onclick="insertFunction('erase')">C</button>

            <button onclick="insertNumber(7)">7</button>
            <button onclick="insertNumber(8)">8</button>
            <button onclick="insertNumber(9)">9</button>
            <button onclick="insertFunction('plus')">+</button>

            <button onclick="insertNumber(4)">4</button>
            <button onclick="insertNumber(5)">5</button>
            <button onclick="insertNumber(6)">6</button>
            <button onclick="insertFunction('minus')">-</button>

            <button onclick="insertNumber(1)">1</button>
            <button onclick="insertNumber(2)">2</button>
            <button onclick="insertNumber(3)">3</button>
            <button onclick="insertFunction('times')">*</button>

            <button onclick="insertNumber(0)">0</button>
            <button onclick="insertFunction('comma')">,</button>
            <button class="" onclick="insertFunction('equal')">=</button>
            <button onclick="insertFunction('divide')">/</button>
        </div>
    </div>
    <div class="dark-mode-container">
        <div class="dark-mode-text">Dark Mode</div>

        <label class="switch">

            <input type="checkbox"
                   id="darkModeToggle">

            <span class="slider"></span>

        </label>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
