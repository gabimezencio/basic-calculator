<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>
    <h1 style="text-align: center;" id="display">0</h1>
    <div style="text-align: center;"><button onclick="displayAdd()">+</button><button onclick="displayMin()">-</button><button onclick="displayTim()">*</button><button onclick="displayDiv()">/</button></div>
    <div style="text-align: center;"><button onclick="insertNumber(7)">7</button><button onclick="insertNumber(8)">8</button><button onclick="insertNumber(9)">9</button></div>
    <div style="text-align: center;"><button onclick="insertNumber(4)">4</button><button onclick="insertNumber(5)">5</button><button onclick="insertNumber(6)">6</button></div>
    <div style="text-align: center;"><button onclick="insertNumber(1)">1</button><button onclick="insertNumber(2)">2</button><button onclick="insertNumber(3)">3</button></div>
    <div style="text-align: center;"><button onclick="insertNumber(0)">0</button><button onclick="displayEq()">=</button><button onclick="displayC()">C</button></div>
    <script src="calculator.js"></script>
</body>
</html>
